<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>올톨로지 덧셈 계산기</title>
    <style>
      :root {
        --bg: #f6faf7;
        --card: #ffffff;
        --text: rgba(10, 18, 32, 0.92);
        --muted: rgba(10, 18, 32, 0.62);
        --line: rgba(10, 18, 32, 0.12);
        --accent: #006b4f;
        --accent2: #006b4f;
        --danger: #ef4444;
        --shadow: 0 18px 60px rgba(10, 18, 32, 0.12);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .wrap {
        width: min(760px, 100%);
      }

      .banner {
        width: 100%;
        border-radius: var(--radius);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        margin-bottom: 14px;
        overflow: hidden;
        position: relative;
        background: #fff;
      }

      .banner::before {
        content: "";
        position: absolute;
        inset: -20px;
        background-image: url("/assets/top.png");
        background-size: cover;
        background-position: center;
        filter: blur(18px) saturate(1.1);
        transform: scale(1.06);
        opacity: 0.9;
      }

      .banner::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
            70% 90% at 50% 50%,
            rgba(255, 255, 255, 0.0) 0%,
            rgba(255, 255, 255, 0.22) 55%,
            rgba(255, 255, 255, 0.55) 100%
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.16),
            rgba(0, 0, 0, 0.0) 28%,
            rgba(0, 0, 0, 0.0) 72%,
            rgba(0, 0, 0, 0.16)
          );
        pointer-events: none;
      }

      .banner-img {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: clamp(180px, 24vw, 270px);
        object-fit: contain;
      }

      .header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .brand {
        display: block;
        justify-self: center;
        text-align: center;
        max-width: 100%;
      }

      h1 {
        font-size: 30px;
        line-height: 1.15;
        margin: 0;
        letter-spacing: -0.02em;
        color: var(--accent);
      }

      .title-img {
        display: block;
        height: 78px;
        width: auto;
        max-width: min(520px, 100%);
        object-fit: contain;
        border-radius: 12px;
        margin: 0 auto;
      }

      @media (max-width: 520px) {
        .title-img {
          height: 64px;
        }
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(0, 107, 79, 0.06);
        color: var(--muted);
        font-size: 9px;
        user-select: none;
        justify-self: end;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent2);
        box-shadow: 0 0 0 4px rgba(0, 107, 79, 0.18);
      }

      .card {
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-inner {
        padding: 18px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto;
        gap: 8px;
        align-items: center;
      }

      @media (max-width: 520px) {
        .row {
          grid-template-columns: 1fr;
        }
        .op,
        .eq {
          display: none;
        }
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      input[type="number"] {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.98);
        color: var(--text);
        outline: none;
        font-size: 16px;
      }

      input[type="number"]::placeholder {
        color: rgba(10, 18, 32, 0.35);
      }

      input[type="number"]:focus {
        border-color: rgba(0, 107, 79, 0.55);
        box-shadow: 0 0 0 4px rgba(0, 107, 79, 0.14);
      }

      .op,
      .eq {
        color: var(--muted);
        font-weight: 700;
        font-size: 24px;
        padding: 0 2px;
        justify-self: center;
        align-self: start;
        margin-top: 35px; 
        line-height: 1;
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
        padding-right: 12px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        color: white;
        background: var(--accent);
      }

      .primary {
        padding: 11px 14px;
        font-size: 13px;
        border-radius: 12px;
        box-shadow: none;
      }

      button:hover {
        filter: brightness(0.97);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .ghost {
        background: #ffffff;
        border: 1px solid var(--line);
        color: var(--text);
      }

      .ghost:hover {
        background: rgba(0, 107, 79, 0.06);
      }

      .result {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .result-line {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .result-label {
        color: rgba(0, 107, 79, 0.62);
        font-size: 30px;
        font-weight: 800;
        min-width: 35px;
      }

      .result-value {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--accent);
      }


      .msg {
        font-size: 13px;
        color: var(--muted);
      }

      .msg.error {
        color: rgba(239, 68, 68, 0.95);
      }

      .footer {
        margin-top: 12px;
        color: rgba(10, 18, 32, 0.55);
        font-size: 12px;
      }

      .logs {
        margin-top: 14px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
        display: grid;
        gap: 10px;
      }

      .logs-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .logs-title {
        font-weight: 800;
        color: var(--accent);
        letter-spacing: -0.01em;
      }

      .logs-sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }

      .logs-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 8px;
      }

      .log-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.98);
        display: grid;
        gap: 4px;
      }

      .log-eq {
        font-weight: 800;
        color: var(--text);
      }

      .log-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .empty {
        font-size: 13px;
        color: var(--muted);
      }

      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(10, 18, 32, 0.06);
        color: rgba(10, 18, 32, 0.78);
      }

      @media (max-width: 520px) {
        .actions {
          justify-content: stretch;
        }
        #hint {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="banner" aria-label="TEAM ALLTOLOGY 배너">
        <img class="banner-img" src="/assets/top.png" alt="TEAM ALLTOLOGY 배너" />
      </div>
      <div class="header">
        <div aria-hidden="true"></div>
        <div class="brand">
          <div>
            <img class="title-img" src="/assets/title.png" alt="올톨로지 덧셈 계산기" />
            <p class="subtitle"></p>
          </div>
        </div>
        <div class="badge" id="statusBadge" title="백엔드 연결 상태">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">연결 확인 중…</span>
        </div>
      </div>

      <section class="card" aria-label="calculator">
        <div class="card-inner">
          <div class="row">
            <div class="field">
              <label for="n1">첫 번째 숫자</label>
              <input type="number" id="n1" inputmode="decimal" placeholder="예: 20" />
            </div>
            <div class="op" aria-hidden="true">➕</div>
            <div class="field">
              <label for="n2">두 번째 숫자</label>
              <input type="number" id="n2" inputmode="decimal" placeholder="예: 26" />
            </div>
            <div class="eq" aria-hidden="true"></div>
          </div>

          <div class="actions">
            <button id="btnCalc" class="primary" type="button" onclick="calculate()">더하기</button>
            <button class="ghost" id="btnReset" type="button" onclick="resetAll()">초기화</button>
          </div>

          <div class="result" aria-live="polite">
            <div class="result-line">
              <div class="result-label">Result: </div>
              <div class="result-value" id="result">0</div>
            </div>
            <div class="msg" id="msg"></div>

            <div class="logs" aria-label="계산 로그">
              <div class="logs-head">
                <div>
                  <div class="logs-title">최근 계산 로그</div>
                  <div class="logs-sub" id="logsStatus">불러오는 중…</div>
                </div>
                <div class="actions" style="margin: 0; padding: 0">
                  <button class="ghost" id="btnRefreshLogs" type="button" onclick="refreshLogs()">새로고침</button>
                </div>
              </div>
              <ul class="logs-list" id="logsList"></ul>
              <div class="empty" id="logsEmpty" style="display: none">아직 로그가 없어요.</div>
            </div>
          </div>
        </div>
      </section>

      <div class="footer">
        이화여자대학교 캡스톤디자인프로젝트 2026년 1학기 스타트 03팀 올톨로지
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const n1 = $("n1");
      const n2 = $("n2");
      const resultEl = $("result");
      const msgEl = $("msg");
      const btnCalc = $("btnCalc");
      const statusText = $("statusText");
      const statusDot = $("statusDot");
      const logsList = $("logsList");
      const logsEmpty = $("logsEmpty");
      const logsStatus = $("logsStatus");

      function setMessage(text, type = "info") {
        msgEl.className = "msg" + (type === "error" ? " error" : "");
        msgEl.textContent = text || "";
      }

      function setResult(value) {
        resultEl.textContent = String(value);
      }

      function setLoading(isLoading) {
        btnCalc.disabled = isLoading;
        btnCalc.textContent = isLoading ? "계산 중…" : "더하기";
      }

      function parseNumber(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      async function calculate() {
        setMessage("");
        const num1 = parseNumber(n1.value);
        const num2 = parseNumber(n2.value);

        if (num1 === null || num2 === null) {
          setMessage("숫자 2개를 모두 입력해 주세요.", "error");
          return;
        }

        setLoading(true);

        let response;
        try {
          response = await fetch("/api/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ num1, num2 }),
          });
        } catch (e) {
          setMessage("백엔드 호출에 실패했어요. 잠시 후 다시 시도해 주세요.", "error");
          setLoading(false);
          return;
        }

        if (!response.ok) {
          setMessage(`서버 오류(${response.status})가 발생했어요.`, "error");
          setLoading(false);
          return;
        }

        const data = await response.json();
        setResult(data.result);
        setLoading(false);
        refreshLogs();
      }

      function resetAll() {
        n1.value = "";
        n2.value = "";
        setResult(0);
        setMessage("");
        n1.focus();
      }

      async function checkBackend() {
        try {
          const res = await fetch("/api/hello");
          if (!res.ok) throw new Error("bad status");
          const hello = await res.json();
          statusText.textContent = hello.db_enabled ? "백엔드/DB 연결됨" : "백엔드 연결됨 (DB 미설정)";
          statusDot.style.background = "var(--accent2)";
          statusDot.style.boxShadow = "0 0 0 4px rgba(34, 197, 94, 0.18)";
        } catch {
          statusText.textContent = "백엔드 연결 실패";
          statusDot.style.background = "var(--danger)";
          statusDot.style.boxShadow = "0 0 0 4px rgba(239, 68, 68, 0.18)";
          setMessage("백엔드가 아직 준비 중일 수 있어요. 새로고침해 보세요.", "error");
        }
      }

      function formatWhen(iso) {
        try {
          const d = new Date(iso);
          if (!Number.isFinite(d.getTime())) return iso;
          return d.toLocaleString("ko-KR");
        } catch {
          return iso;
        }
      }

      function renderLogs(logs, dbEnabled) {
        logsList.innerHTML = "";
        if (!dbEnabled) {
          logsEmpty.style.display = "block";
          logsEmpty.textContent = "DB가 아직 설정되지 않아 로그를 저장/조회할 수 없어요.";
          return;
        }

        if (!logs || logs.length === 0) {
          logsEmpty.style.display = "block";
          logsEmpty.textContent = "아직 로그가 없어요.";
          return;
        }

        logsEmpty.style.display = "none";
        for (const l of logs) {
          const li = document.createElement("li");
          li.className = "log-item";
          li.innerHTML = `
            <div class="log-eq">${l.num1} + ${l.num2} = ${l.result}</div>
            <div class="log-meta">
              <span>${formatWhen(l.created_at)}</span>
              ${l.ip ? `<span>IP: ${l.ip}</span>` : ""}
            </div>
          `;
          logsList.appendChild(li);
        }
      }

      async function refreshLogs() {
        logsStatus.textContent = "불러오는 중…";
        try {
          const res = await fetch("/api/logs?limit=10");
          if (!res.ok) throw new Error("bad status");
          const data = await res.json();
          logsStatus.textContent = data.db_enabled ? "DB 로그 표시 중" : "DB 미설정";
          renderLogs(data.logs, data.db_enabled);
        } catch {
          logsStatus.textContent = "불러오기 실패";
        }
      }

      function bindEnterToCalculate(el) {
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") calculate();
        });
      }

      bindEnterToCalculate(n1);
      bindEnterToCalculate(n2);
      checkBackend();
      refreshLogs();
    </script>
  </body>
</html>
