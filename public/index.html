<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vercel 덧셈 계산기</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.65);
        --line: rgba(255, 255, 255, 0.14);
        --accent: #7c3aed;
        --accent2: #22c55e;
        --danger: #ef4444;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: radial-gradient(1200px 700px at 20% 10%, rgba(124, 58, 237, 0.35), transparent 60%),
          radial-gradient(900px 500px at 80% 20%, rgba(34, 197, 94, 0.22), transparent 55%),
          radial-gradient(900px 600px at 40% 90%, rgba(59, 130, 246, 0.18), transparent 60%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .wrap {
        width: min(760px, 100%);
      }

      .header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 28px;
        line-height: 1.15;
        margin: 0;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font-size: 12px;
        user-select: none;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent2);
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
      }

      .card {
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.06));
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-inner {
        padding: 18px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto;
        gap: 10px;
        align-items: center;
      }

      @media (max-width: 520px) {
        .row {
          grid-template-columns: 1fr;
        }
        .op,
        .eq {
          display: none;
        }
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      input[type="number"] {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.18);
        color: var(--text);
        outline: none;
        font-size: 16px;
      }

      input[type="number"]::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      input[type="number"]:focus {
        border-color: rgba(124, 58, 237, 0.6);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.18);
      }

      .op,
      .eq {
        color: var(--muted);
        font-weight: 700;
        font-size: 16px;
        padding: 0 2px;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, var(--accent), #2563eb);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .ghost {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .result {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .result-line {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .result-label {
        color: var(--muted);
        font-size: 13px;
      }

      .result-value {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .msg {
        font-size: 13px;
        color: var(--muted);
      }

      .msg.error {
        color: rgba(239, 68, 68, 0.95);
      }

      .footer {
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
      }

      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.22);
        color: rgba(255, 255, 255, 0.78);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="header">
        <div>
          <h1>Vercel 덧셈 계산기</h1>
          <p class="subtitle">FE에서 숫자 2개 입력 → BE로 전송 → 결과 반환</p>
        </div>
        <div class="badge" id="statusBadge" title="백엔드 연결 상태">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">연결 확인 중…</span>
        </div>
      </div>

      <section class="card" aria-label="calculator">
        <div class="card-inner">
          <div class="row">
            <div class="field">
              <label for="n1">첫 번째 숫자</label>
              <input type="number" id="n1" inputmode="decimal" placeholder="예: 22" />
            </div>
            <div class="op" aria-hidden="true">+</div>
            <div class="field">
              <label for="n2">두 번째 숫자</label>
              <input type="number" id="n2" inputmode="decimal" placeholder="예: 22" />
            </div>
            <div class="eq" aria-hidden="true"></div>
          </div>

          <div class="actions">
            <button id="btnCalc" type="button" onclick="calculate()">더하기</button>
            <button class="ghost" id="btnReset" type="button" onclick="resetAll()">초기화</button>
            <span class="msg" id="hint"
              >팁: 입력 후 <span class="kbd">Enter</span> 로도 계산 가능</span
            >
          </div>

          <div class="result" aria-live="polite">
            <div class="result-line">
              <div class="result-label">결과</div>
              <div class="result-value" id="result">0</div>
            </div>
            <div class="msg" id="msg"></div>
          </div>
        </div>
      </section>

      <div class="footer">
        이화여자대학교 캡스톤디자인프로젝트 2026년 1학기 스타트 03팀 올톨로지 · API:
        <span class="kbd">POST /api/add</span> → {"result": number}
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const n1 = $("n1");
      const n2 = $("n2");
      const resultEl = $("result");
      const msgEl = $("msg");
      const btnCalc = $("btnCalc");
      const statusText = $("statusText");
      const statusDot = $("statusDot");

      function setMessage(text, type = "info") {
        msgEl.className = "msg" + (type === "error" ? " error" : "");
        msgEl.textContent = text || "";
      }

      function setResult(value) {
        resultEl.textContent = String(value);
      }

      function setLoading(isLoading) {
        btnCalc.disabled = isLoading;
        btnCalc.textContent = isLoading ? "계산 중…" : "더하기";
      }

      function parseNumber(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      async function calculate() {
        setMessage("");
        const num1 = parseNumber(n1.value);
        const num2 = parseNumber(n2.value);

        if (num1 === null || num2 === null) {
          setMessage("숫자 2개를 모두 입력해 주세요.", "error");
          return;
        }

        setLoading(true);

        let response;
        try {
          response = await fetch("/api/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ num1, num2 }),
          });
        } catch (e) {
          setMessage("백엔드 호출에 실패했어요. 잠시 후 다시 시도해 주세요.", "error");
          setLoading(false);
          return;
        }

        if (!response.ok) {
          setMessage(`서버 오류(${response.status})가 발생했어요.`, "error");
          setLoading(false);
          return;
        }

        const data = await response.json();
        setResult(data.result);
        setLoading(false);
      }

      function resetAll() {
        n1.value = "";
        n2.value = "";
        setResult(0);
        setMessage("");
        n1.focus();
      }

      async function checkBackend() {
        try {
          const res = await fetch("/api/hello");
          if (!res.ok) throw new Error("bad status");
          statusText.textContent = "백엔드 연결됨";
          statusDot.style.background = "var(--accent2)";
          statusDot.style.boxShadow = "0 0 0 4px rgba(34, 197, 94, 0.18)";
        } catch {
          statusText.textContent = "백엔드 연결 실패";
          statusDot.style.background = "var(--danger)";
          statusDot.style.boxShadow = "0 0 0 4px rgba(239, 68, 68, 0.18)";
          setMessage("백엔드가 아직 준비 중일 수 있어요. 새로고침해 보세요.", "error");
        }
      }

      function bindEnterToCalculate(el) {
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") calculate();
        });
      }

      bindEnterToCalculate(n1);
      bindEnterToCalculate(n2);
      checkBackend();
    </script>
  </body>
</html>
