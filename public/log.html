<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산 로그 (UI)</title>
    <style>
      :root {
        --bg: #f6faf7;
        --card: #ffffff;
        --text: rgba(10, 18, 32, 0.92);
        --muted: rgba(10, 18, 32, 0.62);
        --line: rgba(10, 18, 32, 0.12);
        --accent: #006b4f;
        --danger: #ef4444;
        --shadow: 0 18px 60px rgba(10, 18, 32, 0.12);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", Roboto, "Helvetica Neue", Arial;
        background: var(--bg);
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .wrap {
        width: min(760px, 100%);
      }

      .card {
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-inner {
        padding: 18px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 22px;
        line-height: 1.15;
        margin: 0;
        letter-spacing: -0.02em;
        color: var(--accent);
      }

      .sub {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      button,
      a.btn {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        color: white;
        background: var(--accent);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button:hover,
      a.btn:hover {
        filter: brightness(0.97);
      }

      .ghost {
        background: #ffffff;
        border: 1px solid var(--line);
        color: var(--text);
      }

      .ghost:hover {
        background: rgba(0, 107, 79, 0.06);
      }

      .status {
        font-size: 13px;
        color: var(--muted);
        margin: 8px 0 0;
      }

      .status.error {
        color: rgba(239, 68, 68, 0.95);
      }

      .logs-list {
        list-style: none;
        padding: 0;
        margin: 14px 0 0;
        display: grid;
        gap: 8px;
      }

      .log-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.98);
        display: grid;
        gap: 4px;
      }

      .log-eq {
        font-weight: 800;
        color: var(--text);
      }

      .log-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .empty {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      .pager {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }

      .page-info {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" aria-label="log viewer">
        <div class="card-inner">
          <div class="topbar">
            <div>
              <h1>계산 로그 (UI)</h1>
              <div class="sub">UI 보기: `/log-ui` · JSON 보기: `/logs`</div>
            </div>
            <div class="actions">
              <a class="btn ghost" href="/">계산기로</a>
              <button class="ghost" type="button" onclick="refreshLogs()">새로고침</button>
            </div>
          </div>

          <div class="status" id="status">불러오는 중…</div>
          <ul class="logs-list" id="logsList"></ul>
          <div class="empty" id="empty" style="display: none">아직 로그가 없어요.</div>
          <div class="pager" aria-label="pagination">
            <div class="actions">
              <button class="ghost" id="btnPrev" type="button" onclick="prevPage()">이전</button>
              <button class="ghost" id="btnNext" type="button" onclick="nextPage()">다음</button>
            </div>
            <div class="page-info" id="pageInfo">페이지 1 (10개씩)</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const logsList = $("logsList");
      const emptyEl = $("empty");
      const btnPrev = $("btnPrev");
      const btnNext = $("btnNext");
      const pageInfo = $("pageInfo");

      const PAGE_SIZE = 10;
      let page = 1;
      let lastCount = 0;

      function setPageInfo() {
        pageInfo.textContent = `페이지 ${page} (10개씩)`;
        btnPrev.disabled = page <= 1;
        btnNext.disabled = lastCount < PAGE_SIZE;
      }

      function formatWhen(iso) {
        try {
          const d = new Date(iso);
          if (!Number.isFinite(d.getTime())) return iso;
          return d.toLocaleString("ko-KR");
        } catch {
          return iso;
        }
      }

      function renderLogs(logs, dbEnabled) {
        logsList.innerHTML = "";
        if (!dbEnabled) {
          emptyEl.style.display = "block";
          emptyEl.textContent = "DB가 아직 설정되지 않아 로그를 저장/조회할 수 없어요.";
          return;
        }

        if (!logs || logs.length === 0) {
          emptyEl.style.display = "block";
          emptyEl.textContent = "아직 로그가 없어요.";
          return;
        }

        emptyEl.style.display = "none";
        for (const l of logs) {
          const li = document.createElement("li");
          li.className = "log-item";
          li.innerHTML = `
            <div class="log-eq">${l.num1} + ${l.num2} = ${l.result}</div>
            <div class="log-meta">
              <span>${formatWhen(l.created_at)}</span>
              ${l.ip ? `<span>IP: ${l.ip}</span>` : ""}
            </div>
          `;
          logsList.appendChild(li);
        }
      }

      async function refreshLogs() {
        statusEl.className = "status";
        statusEl.textContent = "불러오는 중…";
        try {
          const offset = (page - 1) * PAGE_SIZE;
          const res = await fetch(`/api/logs?limit=${PAGE_SIZE}&offset=${offset}`);
          if (!res.ok) throw new Error("bad status");
          const data = await res.json();
          statusEl.textContent = data.db_enabled ? "DB 로그 표시 중" : "DB 미설정";
          lastCount = Array.isArray(data.logs) ? data.logs.length : 0;
          renderLogs(data.logs, data.db_enabled);
          setPageInfo();
        } catch {
          statusEl.className = "status error";
          statusEl.textContent = "불러오기 실패 (백엔드/DB 상태를 확인해 주세요)";
        }
      }

      function prevPage() {
        if (page <= 1) return;
        page -= 1;
        refreshLogs();
      }

      function nextPage() {
        if (lastCount < PAGE_SIZE) return;
        page += 1;
        refreshLogs();
      }

      setPageInfo();
      refreshLogs();
    </script>
  </body>
</html>
